<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>停車場車流統計</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* 深色主題變數 */
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2234; --border:#1e2d45;
    --b1f:#00d4ff; --b2f:#a78bfa; --total:#34d399; --amber:#f59e0b;
    --danger:#ef4444; --success:#10b981; --muted:#64748b; --text:#e2e8f0;
  }
  /* 淺色主題變數（紅色系） */
  body.light {
    --bg: #f0f0f0; --surface: #ffffff; --surface2: #f0f2f7; --border: #dde1ea;
    --b1f: #ff6263; --b2f: #ff8c42; --total: #059669; --amber: #d97706;
    --danger: #dc2626; --success: #16a34a; --muted: #94a3b8; --text: #1e293b;
  }
  body.light::before {
    background:
      radial-gradient(ellipse 60% 40% at 10% 20%, rgba(255,98,99,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 90% 80%, rgba(255,140,66,0.05) 0%, transparent 60%);
  }
  /* 淺色模式下 chart.js tooltip */
  body.light .chart-wrap canvas {
    filter: none;
  }
  
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(0,212,255,.04) 0%,transparent 60%),
               radial-gradient(ellipse 40% 60% at 90% 80%,rgba(167,139,250,.05) 0%,transparent 60%);
  }
  .wrap{max-width:1400px;margin:0 auto;padding:24px 20px;position:relative;z-index:1;}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;}
  .logo{display:flex;align-items:center;gap:14px;}
  .logo-icon{width:44px;height:44px;background:#eeeeee;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}
  h1{font-size:1.3rem;font-weight:700;}
  h1 span{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .hdr-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .status{display:flex;align-items:center;gap:7px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
  .dot-text{font-size:.78rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
  .badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;}
  .badge b{color:var(--amber);}
  #last-update{font-size:.78rem;color:var(--b1f);font-family:'JetBrains Mono',monospace;}

  /* Floor tabs */
  .floor-tabs{display:flex;gap:8px;margin-bottom:0px;}
  .ftab{padding:5px 13px;border-radius:6px;font-size:.73rem;font-weight:600;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;letter-spacing:.04em;}
  .ftab[data-f="all"].on{border-color:var(--total);color:var(--total);background:rgba(52,211,153,.08);}
  .ftab[data-f="B1F"].on{border-color:var(--b1f);color:var(--b1f);background:rgba(0,212,255,.08);}
  .ftab[data-f="B2F"].on{border-color:var(--b2f);color:var(--b2f);background:rgba(167,139,250,.08);}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
  @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:transform .2s,border-color .3s;}
  .card:hover{transform:translateY(-2px);}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .3s;}
  .card:hover::before{opacity:1;}
  .card.ct::before{background:linear-gradient(90deg,var(--total),var(--b1f));}
  .card.cb1::before{background:linear-gradient(90deg,var(--b1f),#0ea5e9);}
  .card.cb2::before{background:linear-gradient(90deg,var(--b2f),#ec4899);}
  .card.cr::before{background:linear-gradient(90deg,var(--amber),var(--danger));}
  .clabel{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;}
  .cval{font-size:2.1rem;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
  .cval.ct{color:var(--total);} .cval.cb1{color:var(--b1f);} .cval.cb2{color:var(--b2f);} .cval.cr{color:var(--amber);}
  .cunit{font-size:.76rem;color:var(--muted);margin-top:5px;}

  /* Chart */
  .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 24px;margin-bottom:24px;}
  .sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
  .sec-title{font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
  .legend{display:flex;gap:18px;margin-top:8px;flex-wrap:wrap;}
  .leg{display:flex;align-items:center;gap:6px;font-size:.76rem;color:var(--muted);}
  .leg-dot{width:10px;height:10px;border-radius:50%;}

  /* ── 時間篩選器 ── */
  .filter-panel{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

  /* 快速按鈕 */
  .range-tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .rtab{padding:5px 13px;border-radius:6px;font-size:.73rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
  .rtab.on,.rtab:hover{background:var(--b1f);color:#000;border-color:var(--b1f);font-weight:600;}

  /* 分隔線 */
  .filter-divider{width:1px;height:24px;background:var(--border);}

  /* 自訂區間容器 */
  .custom-range{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .custom-range label{font-size:.72rem;color:var(--muted);white-space:nowrap;}

  /* datetime-local input 樣式 */
  .dt-input{
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;
    padding:6px 10px;cursor:pointer;outline:none;transition:border-color .2s;
    color-scheme:dark;
  }
  .dt-input:focus,.dt-input:hover{border-color:var(--b1f);}

  /* 套用按鈕 */
  .apply-btn{
    padding:6px 16px;border-radius:8px;font-size:.78rem;font-weight:600;
    background:linear-gradient(135deg,var(--b1f),var(--b2f));color:#000;
    border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;
    transition:opacity .2s;white-space:nowrap;
  }
  .apply-btn:hover{opacity:.85;}

  /* 目前篩選範圍提示 */
  .range-hint{
    font-size:.72rem;color:var(--amber);font-family:'JetBrains Mono',monospace;
    background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);
    border-radius:6px;padding:4px 10px;white-space:nowrap;
  }

  .chart-wrap{position:relative;height:300px;margin-top:16px;}

  /* Table */
  .tbl-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 24px;}
  .tbl-scroll{overflow-x:auto;max-height:360px;overflow-y:auto;}
  table{width:100%;border-collapse:collapse;font-size:.83rem;}
  thead th{padding:9px 14px;text-align:left;font-size:.67rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;}
  tbody tr{border-bottom:1px solid rgba(30,45,69,.5);transition:background .15s;}
  tbody tr:hover{background:var(--surface2);}
  tbody td{padding:9px 14px;font-family:'JetBrains Mono',monospace;font-size:.81rem;}
  .b1{color:var(--b1f);font-weight:600;} .b2{color:var(--b2f);font-weight:600;} .tt{color:var(--total);font-weight:600;}
  .cup{color:var(--danger);} .cdn{color:var(--success);} .csm{color:var(--muted);}
  .empty{text-align:center;padding:50px;color:var(--muted);}
  .empty .ico{font-size:2.5rem;margin-bottom:10px;}
  
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .sec-hdr {
    margin-bottom: 10px;
  }
  
  /* 深淺色切換 switch */
  .theme-switch {
    cursor: pointer;
    user-select: none;
  }
  
  .switch-track {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    transition: background 0.3s, border-color 0.3s;
    position: relative;
  }
  
  .switch-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--b1f), var(--b2f));
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  
  body.light .switch-thumb {
    transform: translateX(2px);
    background: linear-gradient(135deg, #ff6263, #ff8c42);
  }

  /* 淺色模式下日期選擇器配色 */
  body.light .dt-input {
    color-scheme: light;
  }
  
  .switch-icon {
    font-size: 14px;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon"><img src="icon.png" width="32px"></div>
      <h1>停車場流量統計
        <span>更新頻率 / 尖峰約每10分鐘 · 離峰每小時</span>
      </h1>
    </div>
    <div class="hdr-right">
      <!-- 深淺色切換開關 -->
      <div class="theme-switch" onclick="toggleTheme()" id="theme-btn" title="切換深/淺色模式">
        <div class="switch-track">
          <div class="switch-thumb"></div>
          <span class="switch-icon">深/淺色</span>
        </div>
      </div>
      <div class="status">
        <div class="dot" id="dot"></div>
        <span class="dot-text" id="dot-txt">載入中…</span>
      </div>
      <div class="badge">自動刷新 <b id="cd">600</b>s</div>
      <div id="last-update">--</div>
    </div>
  </header>

  <div class="stats">
    <div class="card ct"><div class="clabel">目前總車輛數</div><div class="cval ct" id="s-total">--</div><div class="cunit">輛 / 716 格</div></div>
    <div class="card cb2"><div class="clabel">B2F 目前車輛</div><div class="cval cb2" id="s-b2f">--</div><div class="cunit">輛 / 495 格</div></div>
    <div class="card cb1"><div class="clabel">B1F 目前車輛</div><div class="cval cb1" id="s-b1f">--</div><div class="cunit">輛 / 221 格</div></div>
    <div class="card cr"><div class="clabel">目前滿場率</div><div class="cval cr" id="s-rate">--%</div><div class="cunit">（全場）</div></div>
  </div>
  
  <div class="chart-box">
    <div class="sec-hdr">
      <div class="sec-title">車流趨勢折線圖</div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:var(--total)"></div>全場合計</div>
        <div class="leg"><div class="leg-dot" style="background:var(--b2f)"></div>B2F</div>
        <div class="leg"><div class="leg-dot" style="background:var(--b1f)"></div>B1F</div>
      </div>
    </div>
    
    <!-- 篩選器獨立一排 -->
    <div class="filter-row">
      <div class="floor-tabs">
        <button class="ftab on" data-f="all" onclick="setFloor('all',this)">全場</button>
        <button class="ftab"    data-f="B2F" onclick="setFloor('B2F',this)">B2F</button>
        <button class="ftab"    data-f="B1F" onclick="setFloor('B1F',this)">B1F</button>
      </div>
      <div class="range-tabs">
        <button class="rtab on" onclick="setQuick('all',this)">全部</button>
        <button class="rtab" onclick="setQuick(24,this)">24 小時</button>
        <button class="rtab" onclick="setQuick(12,this)">12 小時</button>
        <button class="rtab" onclick="setQuick(6,this)">6 小時</button>
        <button class="rtab" onclick="setQuick(3,this)">3 小時</button>
        <button class="rtab" onclick="setQuick(1,this)">1 小時</button>
      </div>
      <div class="filter-divider"></div>
      <div class="custom-range">
        <label>自訂</label>
        <input type="datetime-local" id="dt-start" class="dt-input">
        <span style="color:var(--muted)">→</span>
        <input type="datetime-local" id="dt-end" class="dt-input">
        <button class="apply-btn" onclick="applyCustomRange()">套用</button>
        <button class="apply-btn" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);" onclick="clearCustomRange()">清除</button>
      </div>
      <div class="range-hint" id="range-hint">顯示全部資料</div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <div class="tbl-box">
    <div class="sec-hdr">
      <div class="sec-title">詳細資料記錄</div>
      <span style="font-size:.78rem;color:var(--muted)" id="rec-cnt">共 0 筆</span>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead><tr><th>#</th><th>時間</th><th>B1F</th><th>B2F</th><th>合計</th><th>變化</th><th>滿場率</th></tr></thead>
        <tbody id="tbody">
          <tr><td colspan="7"><div class="empty"><div class="ico">⛓️‍💥</div><p>資料載入中…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
    <div>
        <p style="font-size: 0.5em; text-align: center">
            <a href="index.html" style="text-decoration: none; color: var(--text);">
            本資料為公益性質之使用，非營利且不涉及任何商業行為。如有涉及著作權之資料來源及其內容，皆屬原權利人所有，所有資訊皆源自網路上搜尋之開放資料進行統計呈現。
            </a>
        </p>
    </div>
</div>
<script>
const TOTAL = 716;
let allData = [], chart = null;
let floor = 'all';
let quickHours = 'all';   // 快速按鈕選的範圍
let customStart = null;   // 自訂開始時間（Date 物件）
let customEnd   = null;   // 自訂結束時間（Date 物件）
let cdTimer = 600;

// ── 資料篩選 ──────────────────────────────────────
function getFiltered() {
  // 自訂區間優先
  if (customStart || customEnd) {
    return allData.filter(d => {
      const t = new Date(d.timestamp);
      if (customStart && t < customStart) return false;
      if (customEnd   && t > customEnd)   return false;
      return true;
    });
  }
  // 快速按鈕
  if (quickHours === 'all') return allData;
  const cut = new Date(Date.now() - Number(quickHours) * 3600000);
  return allData.filter(d => new Date(d.timestamp) >= cut);
}

// ── 快速按鈕 ──────────────────────────────────────
function setQuick(hours, btn) {
  quickHours  = hours;
  customStart = null;
  customEnd   = null;
  document.getElementById('dt-start').value = '';
  document.getElementById('dt-end').value   = '';
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  updateHint();
  render();
}

// ── 自訂區間套用 ────────────────────────────────
function applyCustomRange() {
  const s = document.getElementById('dt-start').value;
  const e = document.getElementById('dt-end').value;

  if (!s && !e) { alert('請至少輸入開始或結束時間'); return; }

  customStart = s ? new Date(s) : null;
  customEnd   = e ? new Date(e) : null;

  if (customStart && customEnd && customStart > customEnd) {
    alert('開始時間不能晚於結束時間');
    return;
  }

  // 取消快速按鈕選取狀態
  quickHours = null;
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('on'));
  updateHint();
  render();
}

// ── 清除自訂區間 ────────────────────────────────
function clearCustomRange() {
  customStart = null;
  customEnd   = null;
  document.getElementById('dt-start').value = '';
  document.getElementById('dt-end').value   = '';
  // 恢復「全部」
  quickHours = 'all';
  document.querySelectorAll('.rtab').forEach((b, i) => {
    if (i === 0) b.classList.add('on');
    else b.classList.remove('on');
  });
  updateHint();
  render();
}

// ── 提示文字更新 ────────────────────────────────
function updateHint() {
  const hint = document.getElementById('range-hint');
  if (customStart || customEnd) {
    const s = customStart ? customStart.toLocaleString('zh-TW',{hour12:false}).slice(0,16) : '最早';
    const e = customEnd   ? customEnd.toLocaleString('zh-TW',{hour12:false}).slice(0,16)   : '最新';
    hint.textContent = `${s}  →  ${e}`;
  } else if (quickHours === 'all') {
    hint.textContent = '顯示全部資料';
  } else {
    hint.textContent = `最近 ${quickHours} 小時`;
  }
}

// ── 樓層切換 ────────────────────────────────────
function setFloor(f, btn) {
  floor = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// ── 主渲染 ──────────────────────────────────────
function render() {
  if (!allData.length) return;
  const last = allData[allData.length - 1];

  // 統計卡片永遠顯示最新值
  document.getElementById('s-total').textContent = last.total;
  document.getElementById('s-b1f').textContent   = last.B1F;
  document.getElementById('s-b2f').textContent   = last.B2F;
  document.getElementById('s-rate').textContent  = (last.total / TOTAL * 100).toFixed(1) + '%';
  document.getElementById('last-update').textContent = '更新：' + last.timestamp;
  document.getElementById('rec-cnt').textContent = `共 ${allData.length} 筆`;

  const data = getFiltered();
  renderChart(data);
  renderTable();
}

// ── 取得目前主題的顏色（深/淺色版切換時圖表跟著變）──
function themeColor(varName) {
  return getComputedStyle(document.body).getPropertyValue(varName).trim();
}

// ── 折線圖 ──────────────────────────────────────
function renderChart(data) {
  const ctx = document.getElementById('chart').getContext('2d');
  if (chart) chart.destroy();

  if (!data.length) {
    chart = null;
    ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    ctx.fillStyle = '#64748b';
    ctx.font = '14px Noto Sans TC';
    ctx.textAlign = 'center';
    ctx.fillText('此區間無資料', ctx.canvas.width / 2, 150);
    return;
  }

  // 動態讀取 CSS 變數顏色，深/淺色版都正確
  const colTotal = themeColor('--total');
  const colB1f   = themeColor('--b1f');
  const colB2f   = themeColor('--b2f');
  const colGrid  = document.body.classList.contains('light')
    ? 'rgba(0,0,0,0.07)' : 'rgba(30,45,69,.6)';
  const colTick  = document.body.classList.contains('light')
    ? '#94a3b8' : '#64748b';
  const colTooltipBg   = document.body.classList.contains('light') ? '#ffffff' : '#1a2234';
  const colTooltipBody = document.body.classList.contains('light') ? '#1e293b' : '#e2e8f0';
  const colTooltipBdr  = document.body.classList.contains('light') ? '#dde1ea' : '#1e2d45';

  const labels = data.map(d => d.timestamp.slice(5, 16));
  const pt = data.length <= 36 ? 3 : 0;

  const ds = (label, key, color) => ({
    label, data: data.map(d => d[key]),
    borderColor: color, backgroundColor: color + '22',
    borderWidth: 2, pointRadius: pt,
    pointBackgroundColor: color, tension: 0.4, fill: true,
  });

  const showAll = floor === 'all';
  const showB1  = floor === 'all' || floor === 'B1F';
  const showB2  = floor === 'all' || floor === 'B2F';

  const datasets = [
    ...(showAll ? [ds('全場合計', 'total', colTotal)] : []),
    ...(showB2  ? [ds('B2F',     'B2F',   colB2f)]   : []),
    ...(showB1  ? [ds('B1F',     'B1F',   colB1f)]   : []),
  ];

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: colTooltipBg,
          titleColor: colTick,
          bodyColor: colTooltipBody,
          borderColor: colTooltipBdr,
          borderWidth: 1, padding: 12
        }
      },
      scales: {
        x: {
          grid: { color: colGrid },
          ticks: { color: colTick, font: { family: 'JetBrains Mono', size: 11 }, maxTicksLimit: 12, maxRotation: 30 }
        },
        y: {
          grid: { color: colGrid },
          ticks: { color: colTick, font: { family: 'JetBrains Mono', size: 11 } },
          beginAtZero: true
        }
      }
    }
  });
}

// ── 資料表格 ────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  const rev = [...allData].reverse();
  if (!rev.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="ico">🔄</div><p>資料載入中…</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = rev.map((row, i) => {
    const origIdx = allData.length - 1 - i;
    const prev = allData[origIdx - 1];
    let ch = '—', cc = 'csm';
    if (prev) {
      const d = row.total - prev.total;
      if (d > 0)      { ch = `▲ ${d}`;          cc = 'cup'; }
      else if (d < 0) { ch = `▼ ${Math.abs(d)}`; cc = 'cdn'; }
    }
    return `<tr>
      <td style="color:var(--muted)">${origIdx + 1}</td>
      <td>${row.timestamp}</td>
      <td class="b1">${row.B1F}</td>
      <td class="b2">${row.B2F}</td>
      <td class="tt">${row.total}</td>
      <td class="${cc}">${ch}</td>
      <td style="color:var(--amber)">${(row.total/TOTAL*100).toFixed(1)}%</td>
    </tr>`;
  }).join('');
}

// ── 初始化 datetime-local 預設值 ───────────────
function initDateInputs() {
  if (!allData.length) return;
  // 預設顯示資料的最早與最晚時間，方便使用者知道可選範圍
  const first = allData[0].timestamp.replace(' ', 'T').slice(0, 16);
  const last  = allData[allData.length - 1].timestamp.replace(' ', 'T').slice(0, 16);
  document.getElementById('dt-start').min = first;
  document.getElementById('dt-start').max = last;
  document.getElementById('dt-end').min   = first;
  document.getElementById('dt-end').max   = last;
}

// ── 資料載入 ────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch(`parking_data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error();
    allData = await res.json();
    initDateInputs();
    render();
    setStatus('ok');
  } catch {
    setStatus('err');
  }
}

function setStatus(s) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('dot-txt');
  if (s === 'ok') {
    dot.style.cssText = 'background:var(--success);box-shadow:0 0 8px var(--success)';
    txt.textContent = '資料同步中';
  } else {
    dot.style.cssText = 'background:var(--danger);box-shadow:0 0 8px var(--danger)';
    txt.textContent = '載入失敗';
  }
}

// 倒數計時，每 600 秒重新讀取
setInterval(() => {
  cdTimer--;
  document.getElementById('cd').textContent = cdTimer;
  if (cdTimer <= 0) { cdTimer = 600; fetchData(); }
}, 1000);

fetchData();

  // 深淺色切換
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  // 重新渲染圖表（讓顏色即時更新）
  if (allData.length) renderChart(getFiltered());
}

// 記住使用者上次的深淺色選擇
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
  }
})();
  
</script>
</body>
</html>
