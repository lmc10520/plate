name: 每10分鐘擷取停車場資料

on:
  schedule:
    - cron: '*/10 * * * *'   # 每 10 分鐘（UTC 時間）
  push:
    branches: [ main ]       # 有新 commit 時也執行，保持 workflow 活躍
  workflow_dispatch:          # 允許手動觸發

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴套件
        run: pip install requests

      - name: 執行擷取腳本
        run: python scraper.py

      - name: 提交並推送更新資料
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parking_data.json
          git diff --staged --quiet || git commit -m "auto: update parking data $(date +'%Y-%m-%d %H:%M')"
          git push
