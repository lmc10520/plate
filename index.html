<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="提供目前停車場使用比例的快速檢視，幫助了解停車場還有多少停車格可以停放。">
    <title>停泊車輛即時資訊</title>
    <script src="https://ajax.googleapis.com/ajax/libs/chartjs/3.9.1/chart.min.js"></script>
    <style>
    /* 1. 全域變數與重設 */
    :root {
        --primary-color: #ff6263;    
        --bg-color: #f8f9fc;         
        --card-bg: #ffffff;          
        --text-color: #5a5c69;       
        --border-radius: 0.75rem;    
        --shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15);
    }

    * { box-sizing: border-box; } /* 確保邊距不影響寬度計算 */

    body {
        background-color: var(--bg-color);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-color);
        margin: 0;
        padding: 15px;
        line-height: 1.5;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #4e73df;
        margin: 20px 0;
    }

    .status-msg { 
        font-size: 0.9em; 
        color: #888; 
        text-align: center; 
        margin-bottom: 20px; 
    }

    /* 2. 圖表容器區塊 */
    .charts-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 25px;
    }

    /* 3. 卡片樣式 (核心) */
    .chart-item {
        flex: 1 1 calc(50% - 10px); /* 桌機版兩個一排 */
        min-width: 320px;          /* 低於此寬度會自動換行 */
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        padding: 20px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 限制畫布高度，防止巨大化 */
    .canvas-wrapper {
        position: relative;
        height: 250px; /* 固定圖表高度 */
        width: 100%;
        margin-bottom: 15px;
    }

    .chart-info {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
    }

    /* 4. 特殊車位統計樣式 */
    .type-stats-container {
        width: 100%;
        margin-top: auto; /* 推至底部 */
    }

    .type-stats {
        display: flex;
        justify-content: space-around;
        background: #f8f9fc;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 10px;
    }

    .type-item {
        text-align: center;
        flex: 1;
    }

    .type-item span {
        display: block;
        font-size: 1.2em;
        font-weight: bold;
        color: #2e7d32;
    }

    .type-label {
        font-size: 0.75em;
        color: #777;
    }

    .floor-label {
        background: #4e73df;
        color: white;
        padding: 5px 20px;
        border-radius: 20px;
        font-size: 1.1em;
        margin-bottom: 15px;
    }

    /* 5. 搜尋區塊 (修正重點) */
    .search-section {
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        padding: 30px 20px;
        box-shadow: var(--shadow);
        text-align: center;
        width: 100%; /* 不再寫死 1024px */
        margin-bottom: 30px;
    }

    #plateInput {
        padding: 12px;
        border: 1px solid #d1d3e2;
        border-radius: 5px;
        width: 100%;
        max-width: 300px;
        font-size: 1.1em;
        margin-bottom: 10px;
    }

    #search-btn {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1em;
        font-weight: bold;
        transition: 0.3s;
    }

    #search-btn:hover { background-color: #ea5550; }

    #result { 
        margin-top: 25px; 
        font-size: 1.1em; 
        min-height: 40px; 
    }

    /* 6. 響應式微調 */
    @media (max-width: 768px) {
        .chart-item {
            flex: 1 1 100%; /* 手機版一格一排 */
        }
        #plateInput {
            max-width: 100%;
        }
    }
    </style>
</head>
<body>
