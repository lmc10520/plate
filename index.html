<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="提供目前停車場使用比例的快速檢視，幫助了解停車場還有多少停車格可以停放。">
    <title>停泊車輛即時資訊</title>
    <script src="https://ajax.googleapis.com/ajax/libs/chartjs/3.9.1/chart.min.js"></script>
    <script src="chart.min.js"></script>
    <style>
    /* 1. 全域變數與重設 */
    :root {
        --primary-color: #ff6263;    
        --bg-color: #f8f9fc;         
        --card-bg: #ffffff;          
        --text-color: #221714;       
        --border-radius: 0.75rem;    
        --shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15);
    }

    * { box-sizing: border-box; } /* 確保邊距不影響寬度計算 */

    body {
        background-color: var(--bg-color);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-color);
        margin: 0;
        padding: 15px;
        line-height: 1.5;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        color: #ff6263;
        margin: 20px 0;
    }

    .status-msg { 
        font-size: 0.9em; 
        color: #888; 
        text-align: center; 
        margin-bottom: 20px; 
    }

    /* 2. 圖表容器區塊 */
    .charts-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 25px;
    }

    /* 3. 卡片樣式 (核心) */
    .chart-item {
        flex: 1 1 calc(50% - 10px); /* 桌機版兩個一排 */
        min-width: 320px;          /* 低於此寬度會自動換行 */
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        padding: 20px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 限制畫布高度，防止巨大化 */
    .canvas-wrapper {
        position: relative;
        height: 250px; /* 固定圖表高度 */
        width: 100%;
        margin-bottom: 15px;
    }

    .chart-info {
        text-align: center;
        margin-bottom: 20px;
        font-weight: bold;
    }

    /* 4. 特殊車位統計樣式 */
    .type-stats-container {
        width: 100%;
        margin-top: auto; /* 推至底部 */
    }

    .type-stats {
        display: flex;
        justify-content: space-around;
        background: #f8f9fc;
        border: 1px solid #eee;
        border-radius: 10px;
        padding: 10px;
    }

    .type-item {
        text-align: center;
        flex: 1;
    }

    .type-item span {
        display: block;
        font-size: 1.2em;
        font-weight: bold;
        color: #2e7d32;
    }

    .type-label {
        font-size: 0.75em;
        color: #777;
    }

    .floor-label {
        background: #ff6263;
        color: white;
        padding: 5px 20px;
        border-radius: 20px;
        font-size: 1.1em;
        margin-bottom: 15px;
    }

    /* 5. 搜尋區塊 (修正重點) */
    .search-section {
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        padding: 30px 20px;
        box-shadow: var(--shadow);
        text-align: center;
        width: 100%; /* 不再寫死 1024px */
        margin-bottom: 30px;
    }

    #plateInput {
        padding: 12px;
        border: 1px solid #d1d3e2;
        border-radius: 5px;
        width: 100%;
        max-width: 300px;
        font-size: 1.1em;
        margin-bottom: 10px;
    }

    #search-btn {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1em;
        font-weight: bold;
        transition: 0.3s;
    }

    #search-btn:hover { background-color: #ea5550; }

    #result { 
        margin-top: 25px; 
        font-size: 1.1em; 
        min-height: 40px; 
    }

    /* 6. 響應式微調 */
    @media (max-width: 768px) {
        .chart-item {
            flex: 1 1 100%; /* 手機版一格一排 */
        }
        #plateInput {
            max-width: 100%;
        }
    }
    </style>
</head>
<body>

<div class="container">
    <h1>停泊車輛即時資訊</h1>
    <div id="status" class="status-msg">連線中...</div>

    <div class="charts-container">
        <!-- B2 卡片 -->
        <div class="chart-item">
            <div class="floor-label">B2F</div>
            <div class="canvas-wrapper">
                <canvas id="chartB2"></canvas>
            </div>
            <div id="infoB2" class="chart-info">---</div>
            <div class="type-stats-container">
                <div class="type-stats" style="border-left: 5px solid #ff6263;">
                    <div class="type-item">
                        <div class="type-label">身障(18)</div>
                        <span id="stat-b2-disabled">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">親子(11)</div>
                        <span id="stat-b2-parent">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">綠能(15)</div>
                        <span id="stat-b2-ev">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- B1 卡片 -->
        <div class="chart-item">
            <div class="floor-label">B1F</div>
            <div class="canvas-wrapper">
                <canvas id="chartB1"></canvas>
            </div>
            <div id="infoB1" class="chart-info">---</div>
            <div class="type-stats-container">
                <div class="type-stats" style="border-left: 5px solid #ff6263;">
                    <div class="type-item">
                        <div class="type-label">身障(5)</div>
                        <span id="stat-b1-disabled">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">親子(4)</div>
                        <span id="stat-b1-parent">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">綠能(0)</div>
                        <span id="stat-b1-ev">0</span>
                    </div>
                </div>
            </div>            
        </div>
    </div>

    <!-- 搜尋區 -->
    <div class="search-section">
        <input type="number" id="plateInput" inputmode="numeric" pattern="[0-9]*" placeholder="輸入車牌數字" onkeyup="if(event.keyCode==13) searchCar()">
        <button id="search-btn" onclick="searchCar()">搜尋車位</button>
        <div id="result"></div>
    </div>

    <p style="font-size: 0.75em; text-align: center; color: #aaa; margin-bottom: 50px;">
        <a href="dashboard.html" style="text-decoration: none; color: #888;">
        本資料為公益性質之使用，非營利且不涉及任何商業行為。如有涉及著作權之資料來源及其內容，皆屬原權利人所有，所有資訊皆源自網路上搜尋之開放資料進行統計呈現。
        </a>
    </p>
</div>

<script>
    const API_URL = "https://analytics.sto-tek.com/_nodered/api/callExternalAPI?apiKey=495370807e744c8685b05ed5aabc3712&EAPI=API_Building_02&buildingID=kaohsiung_weiwuying&s=&m=lpr&p=0";
    const TOTAL_B1 = 221;
    const TOTAL_B2 = 495;
    let allData = [];
    let chartB1, chartB2;

    function initCharts() {
        const config = (color1, color2) => ({
            type: 'pie',
            data: {
                labels: ['已入場', '剩餘空位'],
                datasets: [{ data: [0, 100], backgroundColor: [color1, color2], borderWidth: 0 }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, // 關鍵：讓畫布跟隨容器高度
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } 
            }
        });

        chartB1 = new Chart(document.getElementById('chartB1'), config('#ff6263', '#eaecf4'));
        chartB2 = new Chart(document.getElementById('chartB2'), config('#ff6263', '#eaecf4'));
    }

    async function updateDashboard() {
        try {
            document.getElementById('status').innerText = "更新中...";
            const response = await fetch(API_URL);
            const rawData = await response.json();
            if (rawData && rawData.data) { allData = rawData.data; }
            
            const now = new Date().toLocaleTimeString();
            document.getElementById('status').innerText = `最後更新：${now} (${allData.length} 筆)`;

            const occupiedB1 = allData.filter(item => item.Floor === 'B1F' && item.LicensePlate && item.LicensePlate !== "NONE").length;
            const occupiedB2 = allData.filter(item => item.Floor === 'B2F' && item.LicensePlate && item.LicensePlate !== "NONE").length;

            const b1Data = allData.filter(item => item.Floor === 'B1F');
            document.getElementById('stat-b1-disabled').innerText = b1Data.filter(item => item.Type.includes("身障") && item.LicensePlate !== "NONE").length;
            document.getElementById('stat-b1-parent').innerText = b1Data.filter(item => item.Type.includes("親子") && item.LicensePlate !== "NONE").length;
            document.getElementById('stat-b1-ev').innerText = b1Data.filter(item => (item.Type.includes("電動") || item.Type.includes("綠能")) && item.LicensePlate !== "NONE").length;

            const b2Data = allData.filter(item => item.Floor === 'B2F');
            document.getElementById('stat-b2-disabled').innerText = b2Data.filter(item => item.Type.includes("身障") && item.LicensePlate !== "NONE").length;
            document.getElementById('stat-b2-parent').innerText = b2Data.filter(item => item.Type.includes("親子") && item.LicensePlate !== "NONE").length;
            document.getElementById('stat-b2-ev').innerText = b2Data.filter(item => (item.Type.includes("電動") || item.Type.includes("綠能")) && item.LicensePlate !== "NONE").length;

            updateChart(chartB1, occupiedB1, TOTAL_B1, 'infoB1');
            updateChart(chartB2, occupiedB2, TOTAL_B2, 'infoB2');
        } catch (e) { document.getElementById('status').innerText = "連線異常"; }
    }

    function updateChart(chartObj, occupied, total, infoId) {
        chartObj.data.datasets[0].data = [occupied, total - occupied];
        chartObj.update();
        const percent = ((occupied / total) * 100).toFixed(1);
        document.getElementById(infoId).innerHTML = `已停: ${occupied} / 總位: ${total} <br><span style="color:#d32f2f">佔用率: ${percent}%</span>`;
    }

    function searchCar() {
        const inputNumbers = document.getElementById('plateInput').value.trim();
        if (!inputNumbers) { document.getElementById('result').innerText = "請輸入數字"; return; }
        const matches = allData.filter(item => {
            if (!item.LicensePlate || item.LicensePlate === "NONE") return false;
            return item.LicensePlate.toString().replace(/\D/g, '') === inputNumbers;
        });
        const resultDiv = document.getElementById('result');
        if (matches.length > 0) {
            let html = "";
            matches.forEach(car => {
                html += `<div style="padding:15px; border-bottom:1px solid #eee">位置：<b style="color:#ff6263; font-size:1.5em">${car.ParkingNumber}</b><br>樓層：${car.Floor} (${car.Type})</div>`;
            });
            resultDiv.innerHTML = html;
        } else { resultDiv.innerHTML = "找不到車牌"; }
    }

    initCharts();
    updateDashboard();
    setInterval(updateDashboard, 120000);
</script>
</body>
</html>
