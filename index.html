<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="提供目前停車場使用比例的快速檢視，幫助了解停車場還有多少停車格可以停放。">
    <title>停泊車輛即時資訊</title>
    <script src="https://ajax.googleapis.com/ajax/libs/chartjs/3.9.1/chart.min.js"></script>
    <script src="chart.min.js"></script>
    <style>
    /* 基礎重設：消除 body 預設邊距，防止出現奇怪的空白 */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%; /* 讓內容撐滿螢幕 */
        background-color: #f4f7f6;
    }
    h1 {
        text-align: center;
    }
    .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 15px;
        /* 避免 container 被撐開產生底部空白 */
        box-sizing: border-box; 
    }

    /* 圖表容器：預設為橫向排列 */
    .charts-container {
        display: flex;
        flex-wrap: wrap; /* 允許換行 */
        justify-content: space-around;
        gap: 20px;
        margin-bottom: 20px;
    }

    /* 個別圖表框：電腦版寬度 */
    .chart-box {
        flex: 1; /* 平分空間 */
        min-width: 300px;
        max-width: 450px;
        text-align: center;
        /* 重要：固定一個高度比例，防止手機版縮得太小 */
        aspect-ratio: 1 / 1; 
    }
    /* 種類統計樣式 */
    .type-stats { 
        display: flex; justify-content: space-around; 
        background: #f9f9f9; 
        padding: 15px; 
        border-radius: 10px; 
        margin-bottom: 30px; 
        border: 1px solid #eee; 
    }
    .type-item {
        text-align: center; flex: 1; 
    }
    .type-item span {
        display: block; font-size: 24px; font-weight: bold; color: #2e7d32; 
    }
    .type-label { 
        font-size: 14px; color: #666; 
    }

    /* 手機版排版優化 (螢幕小於 768px 時執行) */
    @media (max-width: 768px) {
        .charts-container {
            flex-direction: column; /* 改為上下排列 */
            align-items: center;
        }
        .chart-box {
            width: 100%; /* 手機版佔滿寬度 */
            max-width: 100%;
            margin-bottom: 100px;
        }
        .type-stats {
            flex-direction: column; /* 種類統計也改為上下排列 */
            gap: 10px;
        }
        .type-item {
            border: none !important;
            padding: 10px 0;
            background: #fff;
            border-bottom: 1px solid #eee !important;
        }
    }

    /* 搜尋區樣式 */
    .search-section {
        border-top: 2px solid #eee;
        padding: 30px 10px;
        text-align: center;
    }
    input { 
        padding: 12px; 
        width: 80%; /* 手機版輸入框不要寫死 px，改用百分比 */
        max-width: 300px;
        font-size: 18px;
        border: 2px solid #ddd; 
        border-radius: 8px;
        margin-bottom: 3%;
    }
    button { 
        padding: 12px 30px; font-size: 18px; 
        background-color: #4CAF50; 
        color: white; 
        border: none; border-radius: 8px; cursor: pointer; 
    }
    button:hover { 
        background-color: #45a049; 
    }
    #result { 
        margin-top: 25px; font-size: 28px; font-weight: bold; color: #1e88e5; min-height: 40px; 
    }
    .status-msg { 
        font-size: 14px; color: #888; text-align: center; margin-bottom: 10px; 
    }
    </style>
</head>
<body>

<div class="container">
    <h1>停泊車輛即時資訊</h1>
    <div id="status" class="status-msg">連線中...</div>

    <!-- 圓餅圖區 -->
    <div class="charts-container">
        <div class="chart-box">
            <h3>B1F</h3>
            <canvas id="chartB1"></canvas>
            <div id="infoB1" class="chart-info">---</div>
        </div>
        <div class="chart-box">
            <h3>B2F</h3>
            <canvas id="chartB2"></canvas>
            <div id="infoB2" class="chart-info">---</div>
        </div>
    </div>

    <!-- 車格種類詳細統計 (不分樓層) -->
    <div class="type-stats">
        <div class="type-item">
            <div class="type-label">身障車輛</div>
            <span id="stat-disabled">0</span>
        </div>
        <div class="type-item" style="border-left: 1px solid #ddd; border-right: 1px solid #ddd;">
            <div class="type-label">親子車輛</div>
            <span id="stat-parent">0</span>
        </div>
        <div class="type-item">
            <div class="type-label">綠能/電動車輛</div>
            <span id="stat-ev">0</span>
        </div>
    </div>

    <!-- 搜尋區 -->
    <div class="search-section">
        <h2>停車位置檢索</h2>
        <input type="text" id="plateInput" inputmode="numeric" pattern="[0-9]*" placeholder="請輸入車牌「數字」" onkeyup="if(event.keyCode==13) searchCar()">
        <button onclick="searchCar()">搜尋</button>
        <div id="result"></div>
    </div>
    <div><a href="dashboard.html"><img src="icon.png" width="32px">本資料僅供非營利與公益性質之使用，不涉及任何商業行為。如有涉及著作權之內容，皆屬原權利人所有。</a></div>
</div>

<script>
    const API_URL = "https://analytics.sto-tek.com/_nodered/api/callExternalAPI?apiKey=495370807e744c8685b05ed5aabc3712&EAPI=API_Building_02&buildingID=kaohsiung_weiwuying&s=&m=lpr&p=0";
    
    // 你提供的樓層總數
    const TOTAL_B1 = 221;
    const TOTAL_B2 = 495;

    let allData = [];
    let chartB1, chartB2;

    function initCharts() {
        const config = (color1, color2) => ({
            type: 'pie',
            data: {
                labels: ['已入場車輛數', '剩餘空位數'],
                datasets: [{ data: [0, 100], backgroundColor: [color1, color2] }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        chartB1 = new Chart(document.getElementById('chartB1'), config('#ff6263', '#333333'));
        chartB2 = new Chart(document.getElementById('chartB2'), config('#ff6263', '#333333'));
    }

    async function updateDashboard() {
        try {
            document.getElementById('status').innerText = "連線中...";
            const response = await fetch(API_URL);
            
            if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);
            
            const rawData = await response.json();

            // 關鍵修正：將回傳的 data 陣列存入 allData
            if (rawData && rawData.data) {
                allData = rawData.data;
            } else {
                throw new Error("API 資料格式異常");
            }

            document.getElementById('status').innerText = `最後更新時間：${new Date().toLocaleTimeString()} (共抓取 ${allData.length} 筆資料)`;

            // 邏輯修正：使用 Floor 判斷樓層，且 LicensePlate 不為 "NONE" 視為佔用
            const occupiedB1 = allData.filter(item => 
                item.Floor === 'B1F' && item.LicensePlate && item.LicensePlate !== "NONE"
            ).length;

            const occupiedB2 = allData.filter(item => 
                item.Floor === 'B2F' && item.LicensePlate && item.LicensePlate !== "NONE"
            ).length;

            // 特殊車格統計 (Type)
            const disabledOcc = allData.filter(item => item.Type.includes("身障") && item.LicensePlate !== "NONE").length;
            const parentOcc = allData.filter(item => item.Type.includes("親子") && item.LicensePlate !== "NONE").length;
            const evOcc = allData.filter(item => (item.Type.includes("電動") || item.Type.includes("綠能")) && item.LicensePlate !== "NONE").length;

            // 更新 UI
            updateChart(chartB1, occupiedB1, TOTAL_B1, 'infoB1');
            updateChart(chartB2, occupiedB2, TOTAL_B2, 'infoB2');
            
            document.getElementById('stat-disabled').innerText = disabledOcc;
            document.getElementById('stat-parent').innerText = parentOcc;
            document.getElementById('stat-ev').innerText = evOcc;

        } catch (error) {
            console.error("更新失敗:", error);
            document.getElementById('status').innerText = "更新失敗: " + error.message;
        }
    }

    function updateChart(chartObj, occupied, total, infoId) {
        const empty = total - occupied;
        chartObj.data.datasets[0].data = [occupied, empty];
        chartObj.update();
        const percent = ((occupied / total) * 100).toFixed(1);
        document.getElementById(infoId).innerHTML = `
            已入場車輛數： ${occupied} / 停車格總數： ${total}<br>
            <span style="color:#d32f2f">滿場率： ${percent}%</span>
        `;
    }

    function searchCar() {
        // 1. 取得使用者輸入，並利用正規表示式只留下數字 (\D 代表非數字的字元，全部替換掉)
        const inputRaw = document.getElementById('plateInput').value.trim();
        const inputNumbers = inputRaw.replace(/\D/g, ''); 

        if (!inputNumbers) {
            document.getElementById('result').innerText = "請輸入車牌數字";
            return;
        }

        // 2. 在資料中尋找，同樣將 LicensePlate 轉為純數字進行比對
        // 使用 filter 而不是 find，因為可能會有兩台車數字相同 (例如 ABC-1234 與 DEF-1234)
        const matches = allData.filter(item => {
            if (!item.LicensePlate || item.LicensePlate === "NONE") return false;
            
            const plateNumbers = item.LicensePlate.toString().replace(/\D/g, '');
            return plateNumbers === inputNumbers;
        });
        
        const resultDiv = document.getElementById('result');
        
        if (matches.length > 0) {
            // 如果有多台車數字相同，全部顯示出來
            let htmlResult = "";
            matches.forEach(car => {
                htmlResult += `
                    <div style="margin-bottom: 15px;">
                        🚗 車牌：<span style="color: #2e7d32;">${car.LicensePlate}</span><br>
                        📍 位置：<span style="color: #1e88e5;">${car.ParkingNumber}</span><br>
                        <small style="font-size: 16px; color: #666;">樓層：${car.Floor} / 種類：${car.Type}</small>
                    </div>
                `;
            });
            resultDiv.innerHTML = htmlResult;
        } else {
            resultDiv.innerHTML = `<span style="color:#d32f2f">找不到包含數字 "${inputNumbers}" 的車牌</span>`;
        }
    }

    // 確保全部資源載入後才執行
    function startApp() {
        if (typeof Chart === 'undefined') {
            setTimeout(startApp, 100); // 如果還沒載入完，等 100 毫秒再試一次
            return;
        }
        initCharts();
        updateDashboard();
        // 設定每 2 分鐘更新一次
        setInterval(updateDashboard, 120000);
    }

    startApp(); // 取代原本直接呼叫的方式
</script>

</body>
</html>
