<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="提供目前停車場使用比例的快速檢視，幫助了解停車場還有多少停車格可以停放。">
    <title>停泊車輛即時資訊</title>
    <script src="https://ajax.googleapis.com/ajax/libs/chartjs/3.9.1/chart.min.js"></script>
    <script src="chart.min.js"></script>
    <style>
    :root {
    --primary-color: #ff6263;    /* 主色 */
    --bg-color: #f4f7f6;         /* 背景底色 */
    --card-bg: #ffffff;          /* 卡片顏色 */
    --text-color: #5a5c69;       /* 文字顏色 */
    --border-radius: 0.75rem;    /* 圓角弧度 */
    --shadow: 0 .15rem 1.75rem 0 rgba(58,59,69,.15); /* 陰影 */
    }
    body {
        background-color: var(--bg-color);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-color);
        justify-content: center; /* 水平置中 */
    }
    /* 圖表容器：預設為橫向排列 */
    .charts-container{
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        box-shadow: var(--shadow);
        padding: 10px;
        flex-shrink: 0; /* 防止 Safari 將此區塊壓扁導致重疊 */
        min-height: 588px; /* 設定一個合理的最小高度給 Safari 讀取*/        
        gap: 20px;
        display: flex;
        flex-wrap: wrap; /* 允許換行 */
        justify-content: center; /* 水平置中 */
        width: 1024px;
        margin: 0 auto;
    }
    .search-section {
        background: var(--card-bg);
        border: 1px solid #e3e6f0;
        border-radius: var(--border-radius);
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 24px;
        min-height: 100%; /* 讓內容撐滿螢幕 */
        flex-shrink: 0; /* 防止 Safari 將此區塊壓扁導致重疊 */
        gap: 20px;
        display: flex;
        flex-wrap: wrap; /* 允許換行 */
        justify-content: center; /* 水平置中 */
        width: 1024px;
        margin: 0 auto;
    }
       
    h1 {
        text-align: center;
    }
        
    /* 個別圖表框：電腦版寬度 */
    .chart-box {
        flex: 1; /* 平分空間 */
        min-width: 300px;
        max-width: 450px;
        text-align: center;
        /* 重要：固定一個高度比例，防止手機版縮得太小 */
        aspect-ratio: 1 / 1; 
    }
    /* 種類統計樣式 */
    .type-stats-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
    }

    .type-stats {
        display: flex;
        align-items: center;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 10px;
    }

    .floor-label {
        background: #444;
        color: white;
        padding: 5px 15px;
        border-radius: 5px;
        font-weight: bold;
        margin-right: 15px;
        min-width: 40px;
        text-align: center;
    }

    /* B1 B2 不同顏色提示 */
    .floor-b1 { border-left: 8px solid #ff6384; }
    .floor-b2 { border-left: 8px solid #ff9f40; }

    .type-item {
        flex: 1;
        text-align: center;
        border-right: 1px solid #eee;
    }

    .type-item:last-child { border-right: none; }

    .type-item span {
        display: block;
        font-size: 22px;
        font-weight: bold;
        color: #2e7d32;
    }

    .type-label {
        font-size: 12px;
        color: #777;
    }

    /* 手機版排版優化 (螢幕小於 768px 時執行) */
    @media (max-width: 768px) {
        .charts-container {
            flex-direction: column; /* 改為上下排列 */
            align-items: center;
        }
        .chart-box {
            width: 100%; /* 手機版佔滿寬度 */
            max-width: 100%;
            margin-bottom: 222px;
        }
        .type-stats {
            flex-wrap: wrap;
        }
        .floor-label {
            width: 100%;
            margin-bottom: 10px;
            margin-right: 0;
        }
        .type-item {
            border: none !important;
            padding: 10px 0;
            background: #fff;
            border-bottom: 1px solid #eee !important;
        }
    }
        
    /* 修改按鈕 */
    .search-section button {
        background-color: var(--primary-color);
        border: none;
        border-radius: 5px;
        color: white;
        padding: 10px 20px;
        transition: background 0.3s ease;
        font-size: 1.5em;
    }
    
    .search-section button:hover {
        background-color: #ea5550; /* 稍微加深的顏色 */
    }
    
    /* 修改輸入框 */
    .search-section input {
        border: 1px solid #d1d3e2;
        border-radius: 5px;
        padding: 10px;
        font-size: 1.5em;
    }
        
    /* 搜尋區樣式 */
    .search-section {
        border-top: 2px solid #eee;
        padding: 30px 10px;
        text-align: center;
    }
    #result { 
        margin-top: 25px; font-size: 1em; font-weight: bold; min-height: 40px; 
    }
    .status-msg { 
        font-size: 0.9em; color: #888; text-align: center; margin-bottom: 10px; 
    }
    </style>
</head>
<body>

<div class="container">
    <h1>停泊車輛即時資訊</h1>
    <div id="status" class="status-msg">連線中...</div>

    <!-- 圓餅圖區 -->
    <div class="charts-container">
        <div class="chart-box">
            <h3 class="floor-label">B2F</h3>
            <canvas id="chartB2"></canvas>
            <div id="infoB2" class="chart-info">---</div>
            <!-- 車格種類詳細統計 (分樓層顯示) -->
            <div class="type-stats-container">
                <!-- B2F 特殊車位 -->
                <div class="type-stats floor-b2">
                    <div class="type-item">
                        <div class="type-label">身障車輛(18)</div>
                        <span id="stat-b2-disabled">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">親子車輛(11)</div>
                        <span id="stat-b2-parent">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">綠能/電動(15)</div>
                        <span id="stat-b2-ev">0</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="chart-box">
            <h3 class="floor-label">B1F</h3>
            <canvas id="chartB1"></canvas>
            <div id="infoB1" class="chart-info">---</div>
            <!-- 車格種類詳細統計 (分樓層顯示) -->
            <div class="type-stats-container">
                <!-- B1F 特殊車位 -->
                <div class="type-stats floor-b1">
                    <div class="type-item">
                        <div class="type-label">身障車輛(5)</div>
                        <span id="stat-b1-disabled">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">親子車輛(4)</div>
                        <span id="stat-b1-parent">0</span>
                    </div>
                    <div class="type-item">
                        <div class="type-label">綠能/電動(0)</div>
                        <span id="stat-b1-ev">0</span>
                    </div>
                </div>
            </div>            
        </div>
    </div>

    <!-- 搜尋區 -->
    <div class="search-section">
        <div style="display: block">
            <input type="number" id="plateInput" inputmode="numeric" pattern="[0-9]*" placeholder="輸入車牌所有數字找位置" onkeyup="if(event.keyCode==13) searchCar()">
            <button onclick="searchCar()">搜尋</button>
            <div id="result"></div>
        </div>
    </div>
    <div>
        <p style="font-size: 0.75em; text-align: center">
            <a href="dashboard.html" style="text-decoration: none; color: black;">
            本資料為公益性質之使用，非營利且不涉及任何商業行為。如有涉及著作權之資料來源及其內容，皆屬原權利人所有，所有資訊皆源自網路上搜尋之開放資料進行統計呈現。
            </a>
        </p>
    </div>
</div>

<script>
    const API_URL = "https://analytics.sto-tek.com/_nodered/api/callExternalAPI?apiKey=495370807e744c8685b05ed5aabc3712&EAPI=API_Building_02&buildingID=kaohsiung_weiwuying&s=&m=lpr&p=0";
    
    // 你提供的樓層總數
    const TOTAL_B1 = 221;
    const TOTAL_B2 = 495;

    let allData = [];
    let chartB1, chartB2;

    function initCharts() {
        const config = (color1, color2) => ({
            type: 'pie',
            data: {
                labels: ['已入場車輛數', '剩餘空位數'],
                datasets: [{ data: [0, 100], backgroundColor: [color1, color2] }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        chartB1 = new Chart(document.getElementById('chartB1'), config('#ff6263', '#333333'));
        chartB2 = new Chart(document.getElementById('chartB2'), config('#ff6263', '#333333'));
    }

    async function updateDashboard() {
        try {
            document.getElementById('status').innerText = "連線中...";
            const response = await fetch(API_URL);
            
            if (!response.ok) throw new Error(`HTTP 錯誤: ${response.status}`);
            
            const rawData = await response.json();
    
            // 1. 確保資料陣列存在並賦值給 allData
            if (rawData && rawData.data) {
                allData = rawData.data;
            } else {
                throw new Error("API 資料格式異常");
            }
    
            // 2. 更新時間顯示
            const now = new Date().toLocaleTimeString();
            document.getElementById('status').innerText = `最後更新時間：${now} (共抓取 ${allData.length} 筆資料)`;
    
            // 3. 樓層統計邏輯 (判斷是否佔用)
            const occupiedB1 = allData.filter(item => 
                item.Floor === 'B1F' && item.LicensePlate && item.LicensePlate !== "NONE"
            ).length;
    
            const occupiedB2 = allData.filter(item => 
                item.Floor === 'B2F' && item.LicensePlate && item.LicensePlate !== "NONE"
            ).length;
    
            // 4. 特殊車格分樓層統計
            // B1F
            const b1Data = allData.filter(item => item.Floor === 'B1F');
            const b1Disabled = b1Data.filter(item => item.Type.includes("身障") && item.LicensePlate !== "NONE").length;
            const b1Parent = b1Data.filter(item => item.Type.includes("親子") && item.LicensePlate !== "NONE").length;
            const b1EV = b1Data.filter(item => (item.Type.includes("電動") || item.Type.includes("綠能")) && item.LicensePlate !== "NONE").length;
    
            // B2F
            const b2Data = allData.filter(item => item.Floor === 'B2F');
            const b2Disabled = b2Data.filter(item => item.Type.includes("身障") && item.LicensePlate !== "NONE").length;
            const b2Parent = b2Data.filter(item => item.Type.includes("親子") && item.LicensePlate !== "NONE").length;
            const b2EV = b2Data.filter(item => (item.Type.includes("電動") || item.Type.includes("綠能")) && item.LicensePlate !== "NONE").length;
    
            // 5. 更新文字數據到 HTML
            // B1 樓層統計文字
            document.getElementById('stat-b1-disabled').innerText = b1Disabled;
            document.getElementById('stat-b1-parent').innerText = b1Parent;
            document.getElementById('stat-b1-ev').innerText = b1EV;
            
            // B2 樓層統計文字
            document.getElementById('stat-b2-disabled').innerText = b2Disabled;
            document.getElementById('stat-b2-parent').innerText = b2Parent;
            document.getElementById('stat-b2-ev').innerText = b2EV;
    
            // 6. 更新 Pie Chart (這部分最重要，必須放在最後確保資料都算好了)
            updateChart(chartB1, occupiedB1, TOTAL_B1, 'infoB1');
            updateChart(chartB2, occupiedB2, TOTAL_B2, 'infoB2');
    
        } catch (error) {
            console.error("更新失敗:", error);
            document.getElementById('status').innerText = "更新失敗: " + error.message;
        }
    }

    function updateChart(chartObj, occupied, total, infoId) {
        const empty = total - occupied;
        chartObj.data.datasets[0].data = [occupied, empty];
        chartObj.update();
        const percent = ((occupied / total) * 100).toFixed(1);
        document.getElementById(infoId).innerHTML = `
            已入場車輛數： ${occupied} / 停車格總數： ${total}<br>
            <span style="color:#d32f2f">滿場率： ${percent}%</span>
        `;
    }

    function searchCar() {
        // 1. 取得使用者輸入，並利用正規表示式只留下數字 (\D 代表非數字的字元，全部替換掉)
        const inputRaw = document.getElementById('plateInput').value.trim();
        const inputNumbers = inputRaw.replace(/\D/g, ''); 

        if (!inputNumbers) {
            document.getElementById('result').innerText = "請輸入車牌數字";
            return;
        }

        // 2. 在資料中尋找，同樣將 LicensePlate 轉為純數字進行比對
        // 使用 filter 而不是 find，因為可能會有兩台車數字相同 (例如 ABC-1234 與 DEF-1234)
        const matches = allData.filter(item => {
            if (!item.LicensePlate || item.LicensePlate === "NONE") return false;
            
            const plateNumbers = item.LicensePlate.toString().replace(/\D/g, '');
            return plateNumbers === inputNumbers;
        });
        
        const resultDiv = document.getElementById('result');
        
        if (matches.length > 0) {
            // 如果有多台車數字相同，全部顯示出來
            let htmlResult = "";
            matches.forEach(car => {
                htmlResult += `
                    <div style="margin-bottom: 15px;">
                        位置：<span style="color: #ff6263; font-size:2em">${car.ParkingNumber}</span><br>
                        車牌：${car.LicensePlate} ． 樓層：${car.Floor} ． 種類：${car.Type}
                    </div>
                `;
            });
            resultDiv.innerHTML = htmlResult;
        } else {
            resultDiv.innerHTML = `<span style="color:#d32f2f">找不到包含數字 "${inputNumbers}" 的車牌</span>`;
        }
    }

    // 確保全部資源載入後才執行
    function startApp() {
        if (typeof Chart === 'undefined') {
            setTimeout(startApp, 100); // 如果還沒載入完，等 100 毫秒再試一次
            return;
        }
        initCharts();
        updateDashboard();
        // 設定每 2 分鐘更新一次
        setInterval(updateDashboard, 120000);
    }

    startApp(); // 取代原本直接呼叫的方式
</script>

</body>
</html>
